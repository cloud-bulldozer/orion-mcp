apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: orion-mcp

resources:
  - namespace.yaml
  - secret-quay.yaml
  - serviceaccount.yaml
  - service.yaml
  - imagestream.yaml
  - deployment.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: orion-mcp-env
    namespace: orion-mcp
    envs:
      - .env
