apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: orion-mcp 
  name: orion-mcp 
  namespace: orion-mcp
  annotations:
    image.openshift.io/triggers: |
      [
        {
          "from": {
            "kind": "ImageStreamTag",
            "name": "orion-mcp:latest",
            "namespace": "orion-mcp"
          },
          "fieldPath": "spec.template.spec.containers[?(@.name==\"orion-mcp\")].image"
        }
      ]
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: orion-mcp 
      app.kubernetes.io/name: orion-mcp 
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: orion-mcp
        app.kubernetes.io/name: orion-mcp 
    spec:
      containers:
      - image: orion-mcp:latest
        imagePullPolicy: Always
        name: orion-mcp 
        envFrom:
        - secretRef:
          name: orion-mcp-env
        ports:
        - containerPort: 3030
          protocol: TCP
        resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              memory: "512Mi"
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
