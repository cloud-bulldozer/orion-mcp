apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: orion-mcp
  namespace: orion-mcp
  labels:
    app: orion-mcp
spec:
  lookupPolicy:
    local: true
  tags:
    - name: latest
      from:
        kind: DockerImage
        name: quay.io/rh_perfscale/orion-mcp:latest
      importPolicy:
        scheduled: true
      referencePolicy:
        type: Source
